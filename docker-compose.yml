version: "3.9"

# Single-image deployment: the Go binary serves the admin SPA + the
# kiosk SPA + the kiosk-side REST surface. **Stateless** — no SQLite,
# no volume; every operation is forwarded to the legacy MAIC PHP
# monolith at LEGACY_BASE_URL.

services:
  checkin:
    build: .
    image: maic-kiosk:dev
    environment:
      PORT: "8089"
      LEGACY_BASE_URL: ${LEGACY_BASE_URL:-https://dev.maiccube.com}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8089}
      UPSTREAM_TIMEOUT_MS: "15000"
      # Set to a stable 32+ char random value in production. If unset
      # the binary generates a process-local secret on boot, which is
      # fine for dev but invalidates all sessions on restart.
      KIOSK_SESSION_SECRET: ${KIOSK_SESSION_SECRET:-}
    ports:
      - "8089:8089"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8089/api/kiosk/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
